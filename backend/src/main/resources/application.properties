server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:postgres}
spring.jpa.show-sql=false

# Default runtime is PostgreSQL.
# Use SPRING_PROFILES_ACTIVE=dev only when you explicitly want the old in-memory H2 setup.

# JWT
app.jwt.secret=${APP_JWT_SECRET:projectflow-secret-key-change-in-production-must-be-at-least-256-bits-long}
app.jwt.expiration-ms=86400000
