# PostgreSQL is the default runtime profile.
# By default this uses the standard local "postgres" database and a dedicated "projectflow" schema,
# so a fresh clone only needs PostgreSQL running and does not require manually creating app data.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=projectflow
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-postgresql.sql
